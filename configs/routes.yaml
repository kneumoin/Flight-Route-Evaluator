trip:
  origin: MOW
  destination: KTM
  departure_date: 2026-09-26
  return_date: 2026-11-11
  return_date_end: 2026-11-15
  passengers: 1
  cabin: economy

constraints:
  max_stops: 2
  avoid_transfer_visas: false
  allow_self_transfer: true
  airline_preference_mode: advisory
  baggage:
    checked_required: true
    min_checked_kg: 23
    allow_unknown_for_cached_provider: true

coverage:
  window_days: 3
  outbound_forward_days: 6

cache:
  enabled: true
  ttl: 24h
  directory: .cache

history:
  enabled: false
  directory: history

providers:
  - id: travelpayouts_data
    enabled: true
  - id: mock
    enabled: true
  - id: aviasales
    enabled: false
  - id: kiwi
    enabled: false

scoring:
  currency: USD
  weights:
    price: 1.0
    duration: 0.5
    baggage: 0.3
    visa: 1.0
    self_transfer: 0.8
    late_arrival: 0.4
  late_arrival_after: "18:00"

risk:
  operational_disruption:
    enabled: true
    default_level: LOW
    penalties:
      LOW: 0
      ELEVATED: 5
      HIGH: 12
      UNKNOWN: 8
    hubs:
      KWI: HIGH
      DOH: HIGH
      DXB: HIGH
      SHJ: HIGH
      AUH: HIGH

